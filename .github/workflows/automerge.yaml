name: automerge

on:

  workflow_dispatch:

  push:

    branches:

      - dev

  pull_request:

    branches:

     - dev

    types:

      - labeled

      - unlabeled

      - synchronize

      - opened

      - edited

      - ready_for_review

      - reopened

      - unlocked

  pull_request_review:

    types:

      - submitted

  check_suite:

    types:

      - completed

  status: {}

jobs:

  automerge:

    runs-on: ubuntu-latest

    steps:

      - id: automerge

        name: automerge

        uses: "pascalgn/automerge-action@v0.15.6"

        env:

          GITHUB_TOKEN: "${{ secrets.TOKEN }}"

          MERGE_LABELS: ''

          MERGE_COMMIT_MESSAGE_REGEX: (.*)^---
