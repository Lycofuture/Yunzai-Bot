name: docker test

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches:
      - dev
  pull_request:
    tags:
      - 'v*'
    branches:
     - dev
permissions:
    contents: write
    pull-requests: write
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    #  - uses: actions/checkout@v2
      
     # - name: Modify Build File
     #   run: sed -i "s|# build|build|g" ./docker-compose.yaml 
       #      && sed -i "s|gitee|github|g" ./docker/Dockerfile

    #  - name: Build Docker Images
    #    run: docker compose up -d --build

     # - name: Use Default Config
   #     run: docker cp docker/qq.yaml yunzai-bot:/app/Yunzai-Bot/config/config

   #   - name: Run Test Script
     #   run: docker exec yunzai-bot npm --prefix=/app/Yunzai-Bot run test
      - uses: google-github-actions/release-please-action@v3
        with:
          release-type: node
          token: ${{ secrets.TOKEN }}
          pull-request-header: robot:I have created a release *beep* *boop*.
          changelog-types: '[{"type":"feat","section":"Features","hidden":false},{"type":"fix","section":"Bug Fixes","hidden":false},{"type":"chore","section":"Miscellaneous","hidden":false}]'
          
      - name: Create Tag
       # if: contains(github.ref, 'refs/heads/main')
        run: |
          cd Yunzai-Bot
          git tag v${{ env.RELEASE_VERSION }}
        env:
          RELEASE_VERSION: ${{ steps.generate_release_notes.outputs.version }}

      - name: Push Tag
      #  if: contains(github.ref, 'refs/heads/main')
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tags: true
